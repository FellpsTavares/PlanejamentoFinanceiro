services:
  db:
    volumes:
      - /media/devmon/DATA/dados-felps/postgres/data:/var/lib/postgresql/data

  web:
    command: >
      /bin/sh -c "if [ -f /etc/letsencrypt/live/elofinanceiro.com.br/fullchain.pem ] && [ -f /etc/letsencrypt/live/elofinanceiro.com.br/privkey.pem ]; then
        cp /etc/nginx/templates/default.https.conf /etc/nginx/conf.d/default.conf;
      else
        cp /etc/nginx/templates/default.http.conf /etc/nginx/conf.d/default.conf;
      fi;
      exec nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /media/devmon/DATA/dados-felps/letsencrypt/conf:/etc/letsencrypt
      - /media/devmon/DATA/dados-felps/letsencrypt/www:/var/www/certbot
      - ./fintech-web/docker/nginx/default.http.conf:/etc/nginx/templates/default.http.conf:ro
      - ./fintech-web/docker/nginx/default.https.conf:/etc/nginx/templates/default.https.conf:ro

  certbot:
    image: certbot/certbot:latest
    container_name: elofinanceiro-certbot
    restart: unless-stopped
    volumes:
      - /media/devmon/DATA/dados-felps/letsencrypt/conf:/etc/letsencrypt
      - /media/devmon/DATA/dados-felps/letsencrypt/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
