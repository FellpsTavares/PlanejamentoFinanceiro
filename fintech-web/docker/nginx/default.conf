server {
    listen 80;
    server_name elofinanceiro.com.br www.elofinanceiro.com.br;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;

    # Serve SPA for root and frontend routes
    location / {
        try_files $uri /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Expose Django admin under /django-admin/ to avoid collision with SPA /admin/* routes
    location /django-admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Keep /admin/* served by the SPA (frontend routes)
    location /admin/ {
        try_files $uri /index.html;
    }

    location /healthz {
        proxy_pass http://backend:8000/healthz/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /srv/static/;
        access_log off;
        expires 7d;
    }

    location /media/ {
        alias /srv/media/;
        access_log off;
        expires 7d;
    }
}
