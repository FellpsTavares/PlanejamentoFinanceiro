services:
  db:
    image: postgres:16-alpine
    container_name: elofinanceiro-db
    restart: unless-stopped
    env_file:
      - ./fintech-saas/.env.docker.production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 8
    volumes:
      - /media/devmon/DATA/dados-felps/postgres/data:/var/lib/postgresql/data

  backend:
    build:
      context: ./fintech-saas
      dockerfile: Dockerfile
    container_name: elofinanceiro-backend
    env_file:
      - ./fintech-saas/.env.docker.production
    command: >
      sh -c "python manage.py migrate &&
             python manage.py ensure_platform_superuser &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - /media/devmon/DATA/dados-felps/backend/media:/app/media
      - /media/devmon/DATA/dados-felps/backend/staticfiles:/app/staticfiles

  web:
    build:
      context: ./fintech-web
      dockerfile: Dockerfile
    container_name: elofinanceiro-web
    command: >
      /bin/sh -c "if [ -f /etc/letsencrypt/live/elofinanceiro.com.br/fullchain.pem ] && [ -f /etc/letsencrypt/live/elofinanceiro.com.br/privkey.pem ]; then
        cp /etc/nginx/templates/default.https.conf /etc/nginx/conf.d/default.conf;
      else
        cp /etc/nginx/templates/default.http.conf /etc/nginx/conf.d/default.conf;
      fi;
      exec nginx -g 'daemon off;'"
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /media/devmon/DATA/dados-felps/backend/media:/srv/media:ro
      - /media/devmon/DATA/dados-felps/backend/staticfiles:/srv/static:ro
      - /media/devmon/DATA/dados-felps/letsencrypt/conf:/etc/letsencrypt
      - /media/devmon/DATA/dados-felps/letsencrypt/www:/var/www/certbot
      - ./fintech-web/docker/nginx/default.http.conf:/etc/nginx/templates/default.http.conf:ro
      - ./fintech-web/docker/nginx/default.https.conf:/etc/nginx/templates/default.https.conf:ro

  certbot:
    image: certbot/certbot:latest
    container_name: elofinanceiro-certbot
    restart: unless-stopped
    volumes:
      - /media/devmon/DATA/dados-felps/letsencrypt/conf:/etc/letsencrypt
      - /media/devmon/DATA/dados-felps/letsencrypt/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
