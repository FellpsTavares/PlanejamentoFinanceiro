services:
  db:
    env_file:
      - ./fintech-saas/.env.docker.local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data

  backend:
    env_file:
      - ./fintech-saas/.env.docker.local

  web:
    ports:
      - "8080:80"

volumes:
  postgres_data_local:
